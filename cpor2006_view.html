<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churrasco CPOR 2006</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#111}
.app{max-width:780px;margin:0 auto;padding:1rem}
.mode-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid #e0e0e0}
.mode-title{font-size:15px;font-weight:600}
.mode-sub{font-size:11px;color:#777;margin-top:1px}
.mode-toggle{display:flex;background:#eee;border:1px solid #ddd;border-radius:20px;padding:3px;gap:2px}
.mode-btn{padding:5px 14px;font-size:12px;font-weight:500;border:none;border-radius:16px;cursor:pointer;background:none;color:#666}
.mode-btn.active{background:#fff;color:#111;border:1px solid #ccc}
.admin-cmd{background:#f0f0f0;border:2px solid #bbb;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.cmd-label{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cmd-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
textarea{width:100%;min-height:80px;padding:10px 12px;font-size:14px;border:1px solid #ccc;border-radius:8px;background:#fff;resize:vertical;font-family:system-ui,sans-serif}
textarea:focus{outline:none;border-color:#888}
.cmd-actions{display:flex;gap:8px;margin-top:10px}
.btn{padding:7px 14px;font-size:13px;font-weight:500;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer}
.btn:hover{background:#f0f0f0}
.btn.primary{background:#111;color:#fff;border-color:#111;font-size:14px;padding:9px 20px}
.btn.primary:hover{opacity:.85}
.hint-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;font-size:12px;color:#666;line-height:1.8;margin-bottom:1rem}
.hint-box strong{font-weight:600;color:#111}
.feedback{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:8px;display:none;white-space:pre-line;line-height:1.6}
.feedback.success{background:#dcfce7;color:#166534}
.feedback.error{background:#fee2e2;color:#991b1b}
.feedback.loading{background:#f0f9ff;color:#0369a1;display:block}
.sum-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.sum-card{background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #e8e8e8}
.sum-card .lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.sum-card .val{font-size:18px;font-weight:600}
.val.green{color:#16a34a}.val.amber{color:#d97706}.val.red{color:#dc2626}
.cursos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.curso-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:12px 10px}
.curso-header{text-align:center;margin-bottom:8px}
.curso-icon{margin-bottom:5px;display:flex;justify-content:center;align-items:center;height:60px}
.curso-icon img{max-height:60px;max-width:90%;object-fit:contain}
.curso-nome{font-size:9px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.curso-count{font-size:20px;font-weight:600;color:#111}
.curso-pct{font-size:10px;color:#888}
.curso-lista{border-top:1px solid #eee;padding-top:6px;margin-top:6px}
.c-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;border-bottom:0.5px solid #f0f0f0}
.c-item:last-child{border-bottom:none}
.c-item.conf{color:#111;font-weight:600}
.c-item.pend{color:#bbb}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1.5px solid #ddd}
.dot.ok{background:#22c55e;border-color:#16a34a}
.dot.half{background:#f59e0b;border-color:#d97706}
.dot.no{background:#fff;border-color:#ddd}
.receb-totais{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.receb-total-card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;flex:1;min-width:110px}
.receb-total-card .lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.receb-total-card .val{font-size:16px;font-weight:600}
.receb-table{width:100%;border-collapse:collapse;font-size:12px}
.receb-table th{background:#f5f5f5;font-size:10px;font-weight:600;color:#555;text-align:left;padding:8px;border:1px solid #e0e0e0;text-transform:uppercase;letter-spacing:.4px}
.receb-table td{padding:7px 8px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.receb-table tr.quitado td{background:#f0fdf4}
.receb-table tr.parcial td{background:#fffbeb}
.receb-table tr.pendente td{color:#bbb}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge.ok{background:#dcfce7;color:#166534}
.badge.half{background:#fef9c3;color:#854d0e}
.badge.pend{background:#f3f4f6;color:#9ca3af}
.prog-bar{height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:3px}
.prog-fill{height:100%;border-radius:3px}
.cost-tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.cost-tbl th{font-size:10px;font-weight:600;color:#888;text-align:left;padding:5px 6px;border-bottom:1px solid #eee;text-transform:uppercase;letter-spacing:.4px}
.cost-tbl td{padding:5px 6px;border-bottom:1px solid #eee}
.cost-tbl input{width:100%;padding:3px 5px;font-size:12px;border:1px solid #ddd;border-radius:4px;background:#fff}
.saldo-box{margin-top:1rem;padding:12px 16px;border-radius:12px;background:#f5f5f5;border:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center}
.view-tabs{display:flex;margin-bottom:1.25rem;border-bottom:1px solid #e0e0e0;overflow-x:auto}
.vtab{padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.vtab.active{color:#111;border-bottom:2px solid #111}
.vsection{display:none}.vsection.active{display:block}
.sect-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:#111;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
<div class="mode-bar">
  <div>
    <div class="mode-title">Churrasco 20 anos — CPOR Turma 2006</div>
    <div class="mode-sub">31/10/2026 · 10h · Local a confirmar</div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-admin" onclick="setMode('admin')">⚙ Admin</button>
    <button class="mode-btn" id="btn-view" onclick="setMode('view')">👁 Visualizar</button>
  </div>
</div>

<div id="view-panel">
  <div class="sum-cards" id="sum-view"></div>
  <div class="view-tabs">
    <button class="vtab active" onclick="switchVTab('cursos',this)">Por curso</button>
    <button class="vtab" onclick="switchVTab('receb',this)">Recebimentos</button>
    <button class="vtab" onclick="switchVTab('custos',this)">Custos</button>
  </div>
  <div id="vtab-cursos" class="vsection active"><div class="cursos-grid" id="cursos-grid"></div></div>
  <div id="vtab-receb" class="vsection">
    <div class="receb-totais" id="receb-totais"></div>
    <div style="overflow-x:auto">
      <table class="receb-table">
        <thead><tr>
          <th style="width:28px">#</th>
          <th>Nome</th>
          <th style="width:100px">Curso</th>
          <th style="width:90px">Pago</th>
          <th style="width:90px">Falta</th>
          <th style="width:120px">Progresso</th>
          <th style="width:80px">Status</th>
        </tr></thead>
        <tbody id="receb-body"></tbody>
      </table>
    </div>
  </div>
  <div id="vtab-custos" class="vsection">
    <table class="cost-tbl" style="font-size:13px">
      <thead><tr>
        <th style="width:35%">Fornecedor</th><th style="width:12%">Qtd</th>
        <th style="width:18%">Unit.</th><th style="width:18%">Total prev.</th><th style="width:17%">Pago</th>
      </tr></thead>
      <tbody id="custos-view-body"></tbody>
    </table>
    <div class="saldo-box" style="margin-top:1rem">
      <span style="font-size:13px;color:#666">Saldo restante</span>
      <span style="font-size:18px;font-weight:600" id="saldo-view">R$ 0</span>
    </div>
  </div>
</div>
</div>

let state = { pessoas: [], custos: [] };
let currentVTab = 'cursos';
let currentMode = 'admin';

// ── API ──────────────────────────────────────────────
async function apiGet(params) {
  const url = API + '?' + new URLSearchParams(params);
  const r = await fetch(url);
  return r.json();
}

async function loadData() {
  try {
    const d = await apiGet({ action: 'getData' });
    if (d.pessoas) state = d;
    renderAll();
  } catch(e) { console.error(e); }
}

// ── HELPERS ──────────────────────────────────────────
function fmtBRL(v) { return 'R$ ' + Math.round(v).toLocaleString('pt-BR'); }
function getCurso(id) { return CURSOS.find(c => c.id === id) || CURSOS[5]; }
function totalArr()   { return state.pessoas.reduce((a,p) => a + p.pago, 0); }
function totalCusto() { return state.custos.reduce((a,c)  => a + c.qtd * c.unit, 0); }
function imgT(cur, h) { return `<img src="${cur.img}" style="height:${h}px;max-width:100%;object-fit:contain">`; }

function sortPessoas(lista) {
  return [
    ...lista.filter(p => p.pago >= COTA),
    ...lista.filter(p => p.pago > 0 && p.pago < COTA),
    ...lista.filter(p => p.pago === 0)
  ];
}

// ── RENDER ───────────────────────────────────────────


function switchVTab(t, btn) {
  currentVTab = t;
  document.querySelectorAll('.vtab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.vsection').forEach(el => el.classList.remove('active'));
  document.getElementById('vtab-' + t).classList.add('active');
  btn.classList.add('active');
  renderView();
}

function renderSumCards(id) {
  const el = document.getElementById(id); if (!el) return;
  const arr = totalArr(), custo = totalCusto(), saldo = arr - custo;
  const quit = state.pessoas.filter(p => p.pago >= COTA).length;
  const parc = state.pessoas.filter(p => p.pago > 0 && p.pago < COTA).length;
  el.innerHTML = `
    <div class="sum-card"><div class="lbl">Quitados</div><div class="val green">${quit}</div></div>
    <div class="sum-card"><div class="lbl">Parciais</div><div class="val amber">${parc}</div></div>
    <div class="sum-card"><div class="lbl">Arrecadado</div><div class="val green">${fmtBRL(arr)}</div></div>
    <div class="sum-card"><div class="lbl">Saldo</div><div class="val ${saldo>=0?'green':'red'}">${fmtBRL(saldo)}</div></div>`;
}

function renderCursos() {
  const grid = document.getElementById('cursos-grid'); if (!grid) return;
  grid.innerHTML = CURSOS.map(cur => {
    const membros = state.pessoas.filter(p => p.curso === cur.id);
    const sorted  = sortPessoas(membros);
    const quit    = membros.filter(p => p.pago >= COTA).length;
    const ativos  = membros.filter(p => p.pago > 0).length;
    const pct     = membros.length ? Math.round(ativos / membros.length * 100) : 0;
    return `<div class="curso-card">
      <div class="curso-header">
        <div class="curso-icon">${imgT(cur,58)}</div>
        <div class="curso-nome">${cur.nome}</div>
        <div class="curso-count">${quit}<span style="font-size:12px;font-weight:400;color:#888">/${membros.length}</span></div>
        <div class="curso-pct">${pct}% pagaram</div>
      </div>
      <div class="curso-lista">${sorted.map(p => {
        const dotCls = p.pago>=COTA?'ok':p.pago>0?'half':'no';
        const cls    = p.pago>0?'conf':'pend';
        const suf    = p.pago>0&&p.pago<COTA?`<span style="color:#d97706;font-size:10px;margin-left:auto">${fmtBRL(p.pago)}</span>`:'';
        return `<div class="c-item ${cls}"><div class="dot ${dotCls}"></div><span>${p.nome}</span>${suf}</div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function renderRecebimentos() {
  const totEl = document.getElementById('receb-totais');
  if (totEl) {
    const arr  = totalArr();
    const quit = state.pessoas.filter(p => p.pago >= COTA).length;
    const parc = state.pessoas.filter(p => p.pago > 0 && p.pago < COTA).length;
    const pend = state.pessoas.filter(p => p.pago === 0).length;
    const faltaTotal = Math.max(0, (quit + parc) * COTA - arr);
    totEl.innerHTML = `
      <div class="receb-total-card"><div class="lbl">Arrecadado</div><div class="val green">${fmtBRL(arr)}</div></div>
      <div class="receb-total-card"><div class="lbl">Falta receber</div><div class="val amber">${fmtBRL(faltaTotal)}</div></div>
      <div class="receb-total-card"><div class="lbl">Quitados</div><div class="val green">${quit}</div></div>
      <div class="receb-total-card"><div class="lbl">Parciais</div><div class="val amber">${parc}</div></div>
      <div class="receb-total-card"><div class="lbl">Pendentes</div><div class="val" style="color:#aaa">${pend}</div></div>`;
  }
  const tbody = document.getElementById('receb-body'); if (!tbody) return;
  const sorted = sortPessoas(state.pessoas);
  tbody.innerHTML = sorted.map((p, i) => {
    const cur   = getCurso(p.curso);
    const falta = Math.max(0, COTA - p.pago);
    const pct   = Math.min(100, Math.round(p.pago / COTA * 100));
    const rowCls = p.pago>=COTA?'quitado':p.pago>0?'parcial':'pendente';
    const badge  = p.pago>=COTA?'<span class="badge ok">Quitado</span>':p.pago>0?'<span class="badge half">Parcial</span>':'<span class="badge pend">Pendente</span>';
    const barColor = p.pago>=COTA?'#22c55e':p.pago>0?'#f59e0b':'#e5e7eb';
    return `<tr class="${rowCls}">
      <td style="color:#aaa;font-size:11px">${i+1}</td>
      <td style="font-weight:600">${p.nome}</td>
      <td style="font-size:11px;color:#777">${cur.nome}</td>
      <td style="font-weight:600;color:${p.pago>0?'#16a34a':'#ccc'}">${p.pago>0?fmtBRL(p.pago):'-'}</td>
      <td style="color:${falta>0?'#dc2626':'#16a34a'}">${falta>0?fmtBRL(falta):'✓'}</td>
      <td><div style="font-size:10px;color:#999;margin-bottom:2px">${pct}%</div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${barColor}"></div></div></td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
}

function renderCustosView() {
  const tbody = document.getElementById('custos-view-body'); if (!tbody) return;
  tbody.innerHTML = state.custos.map(c => {
    const total = c.qtd * c.unit;
    return `<tr>
      <td style="font-weight:500">${c.nome}</td>
      <td style="color:#888">${c.qtd||'-'}</td>
      <td style="color:#888">${c.unit>0?fmtBRL(c.unit):'-'}</td>
      <td>${total>0?fmtBRL(total):'-'}</td>
      <td style="color:${c.pago>0?'#16a34a':'#ccc'}">${c.pago>0?fmtBRL(c.pago):'-'}</td>
    </tr>`;
  }).join('');
  const saldo = totalArr() - totalCusto();
  const el = document.getElementById('saldo-view');
  if (el) { el.textContent = fmtBRL(saldo); el.style.color = saldo>=0?'#16a34a':'#dc2626'; }
}





// ── COMANDO ──────────────────────────────────────────
async function processCmd() {
  const raw = document.getElementById('cmd-input').value.trim();
  if (!raw) { showFeedback('Digite um comando.', 'error'); return; }

  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  showFeedback(`<span class="spinner"></span> Registrando...`, 'loading');

  const msgs = [];
  for (const line of lines) {
    // custo: paguei X de ITEM
    const mPag = /PAGUEI\s+(\d+(?:[.,]\d+)?)\s+(?:DE\s+)?(.+)/i.exec(line);
    if (mPag) {
      const val  = parseFloat(mPag[1].replace(',', '.'));
      const item = mPag[2].trim();
      const res  = await apiGet({ action: 'custo', token: TOKEN, nome: item, valor: val });
      if (res.ok) {
        const found = state.custos.find(c => c.nome.toUpperCase() === (res.item||'').toUpperCase());
        if (found) found.pago = res.pago; else state.custos.push({ nome: res.item, qtd:1, unit:val, pago:val });
        msgs.push(`✓ Custo "${res.item}": pago total ${fmtBRL(res.pago)}`);
      } else msgs.push(`⚠ Erro: ${res.erro||'falha'}`);
      continue;
    }
    // pagamento: NOME pagou X
    const mRec = /^([A-ZÀ-ÚÇÃÕA-Za-zà-úçãõ][A-ZÀ-ÚÇÃÕA-Za-zà-úçãõ\s]+?)\s+PAGOU\s+(\d+(?:[.,]\d+)?)/i.exec(line);
    if (mRec) {
      const nome = mRec[1].trim().toUpperCase();
      const val  = parseFloat(mRec[2].replace(',', '.'));
      const res  = await apiGet({ action: 'pagamento', token: TOKEN, nome, valor: val });
      if (res.ok) {
        const p = state.pessoas.find(x => x.nome.toUpperCase() === nome);
        if (p) p.pago = res.total;
        const falta = Math.max(0, COTA - res.total);
        msgs.push(`✓ ${res.nome}: +${fmtBRL(val)} → total ${fmtBRL(res.total)}${falta>0?' · faltam '+fmtBRL(falta):' · QUITADO ✓'}`);
      } else msgs.push(`⚠ ${res.erro}`);
      continue;
    }
    msgs.push(`⚠ Não entendi: "${line}"`);
  }

  renderAll();
  showFeedback(msgs.join('\n'), msgs.some(m => m.startsWith('⚠')) ? 'error' : 'success');
  document.getElementById('cmd-input').value = '';
}

// ── INIT ─────────────────────────────────────────────
loadData();
