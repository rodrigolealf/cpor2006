<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f0f0;color:#111;padding:12px}
.btns{display:flex;gap:8px;margin-bottom:12px}
.btn{flex:1;padding:11px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-pdf{background:#111;color:#fff}
.btn-img{background:#16a34a;color:#fff}
.btn:active{opacity:.8}
#conteudo{background:#fff;border-radius:12px;padding:14px}
.header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #111}
.header img{height:48px}
.header h1{font-size:15px;font-weight:700;line-height:1.2}
.header p{font-size:10px;color:#666;margin-top:2px}
.header .date{font-size:9px;color:#999;margin-top:1px}
.top-cards{display:flex;gap:6px;margin-bottom:12px}
.top-card{flex:1;background:#f5f5f5;border-radius:6px;padding:7px;text-align:center}
.top-card .lbl{font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}
.top-card .val{font-size:18px;font-weight:700}
.val.green{color:#16a34a}.val.amber{color:#d97706}
.curso-bloco{margin-bottom:8px;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}
.curso-header{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f9f9f9;border-bottom:1px solid #eee}
.curso-header img{height:28px;width:28px;object-fit:contain}
.curso-header .info{flex:1}
.curso-header .nome{font-size:10px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.4px}
.curso-header .stats{font-size:9px;color:#888;margin-top:1px}
.curso-header .count{font-size:15px;font-weight:700;color:#111;margin-left:auto;white-space:nowrap}
.curso-header .count span{font-size:9px;font-weight:400;color:#aaa}
.nomes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;padding:5px 6px}
.nome-item{display:flex;align-items:center;gap:4px;padding:2px 4px;font-size:9.5px}
.nome-item.conf{font-weight:700;color:#111}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dot.ok{background:#22c55e}.dot.half{background:#f59e0b}
.sem-conf{padding:6px 10px;font-size:9px;color:#bbb;font-style:italic}
.footer{text-align:center;font-size:8px;color:#aaa;margin-top:10px}
.loading-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;flex-direction:column;gap:8px}
.loading-overlay.show{display:flex}
@media print{.btns{display:none}body{background:#fff;padding:0}#conteudo{border-radius:0}}
</style>
</head>
<body>
<div class="loading-overlay" id="overlay">
  <div>⏳ Gerando imagem...</div>
  <div style="font-size:11px;opacity:.7">Pode demorar alguns segundos</div>
</div>

<div class="btns">
  <button class="btn btn-pdf" onclick="window.print()">📄 PDF</button>
  <button class="btn btn-img" onclick="gerarImagem()">🖼️ Imagem PNG</button>
</div>

const NOMES = {inf:'Infantaria',art:'Artilharia',eng:'Engenharia',int:'Intendência',com:'Comunicações',mb:'Mat. Bélico'};
const CURSOS = ['inf','art','eng','int','com','mb'];

function fmtBRL(v){return 'R$ '+Math.round(v).toLocaleString('pt-BR');}

async function gerarImagem(){
  document.getElementById('overlay').classList.add('show');
  try{
    const el = document.getElementById('conteudo');
    const canvas = await html2canvas(el,{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',logging:false});
    const link = document.createElement('a');
    link.download = 'cpor2006_confirmados.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }catch(e){
    alert('Erro ao gerar imagem. Use o PDF.');
    console.error(e);
  }finally{
    document.getElementById('overlay').classList.remove('show');
  }
}

async function load(){
  const now = new Date();
  const ds = now.toLocaleDateString('pt-BR') + ' às ' + now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('data-gerado').textContent = ds;
  document.getElementById('footer-date').textContent = ds;

  const r = await fetch(`${SUPA_URL}/rest/v1/pessoas?order=nome`,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
  const pessoas = await r.json();

  const totalConf = pessoas.filter(p=>p.pago>0).length;
  const quit = pessoas.filter(p=>p.pago>=COTA).length;
  const parc = pessoas.filter(p=>p.pago>0&&p.pago<COTA).length;

  document.getElementById('top-cards').innerHTML=`
    <div class="top-card"><div class="lbl">Confirmados</div><div class="val green">${totalConf}</div></div>
    <div class="top-card"><div class="lbl">Quitados</div><div class="val green">${quit}</div></div>
    <div class="top-card"><div class="lbl">Parciais</div><div class="val amber">${parc}</div></div>`;

  document.getElementById('cursos').innerHTML = CURSOS.map(cid=>{
    const membros = pessoas.filter(p=>p.curso===cid);
    const conf = membros.filter(p=>p.pago>0);
    const total = membros.length;
    // confirmados primeiro: quitados depois parciais
    const sorted = [...conf.filter(p=>p.pago>=COTA), ...conf.filter(p=>p.pago>0&&p.pago<COTA)];

    return `<div class="curso-bloco">
      <div class="curso-header">
        <img src="${IMGS[cid]}" alt="${NOMES[cid]}">
        <div class="info">
          <div class="nome">${NOMES[cid]}</div>
          <div class="stats">${conf.length} confirmado${conf.length!==1?'s':''}</div>
        </div>
        <div class="count">${conf.length}<span>/${total}</span></div>
      </div>
      ${sorted.length > 0
        ? `<div class="nomes-grid">${sorted.map(p=>{
            const dotCls = p.pago>=COTA?'ok':'half';
            return `<div class="nome-item conf"><div class="dot ${dotCls}"></div>${p.nome}</div>`;
          }).join('')}</div>`
        : `<div class="sem-conf">Nenhum confirmado ainda</div>`
      }
    </div>`;
  }).join('');
}

load().catch(console.error);
</script>
